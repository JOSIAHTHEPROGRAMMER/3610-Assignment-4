services:
  api:
    build: . # Build API image from Dockerfile in current directory
    ports:
      - "8000:8000" # Expose API on host port 8000
    environment:

      - MODEL_PATH=models/rf_baseline.pkl
      - SCALER_PATH=models/scaler.pkl
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    ports:
      - "5000:5000" # MLflow UI accessible at http://localhost:5000
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/mlruns
    volumes:
      - mlflow-data:/mlflow # Persist experiment data across container restarts

# Named volume so MLflow data survives docker compose down
volumes:
  mlflow-data:
